  <line x1="294" y1="284" x2="390" y2="380" stroke="white" stroke-width="40" stroke-linecap="round"/>
  <!-- Checkmark inside -->
  <path d="M174 210 L210 246 L268 172" fill="none" stroke="white" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
